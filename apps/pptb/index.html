      No remote font links: the PPTB host enforces a strict CSP (font-src 'self'),
      so Google Fonts cannot load and would be a console/CSP violation. Typography
      falls back to the system stack defined in the builder-ui theme tokens. To ship
      Outfit / JetBrains Mono here, bundle them locally (e.g. @fontsource) instead.
    -->
</head>
