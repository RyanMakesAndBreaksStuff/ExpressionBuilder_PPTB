<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Updated Light Mode Palette Collection Vol.1</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{color-scheme:light;--page:#ECEFF2;--panel:#F8F9FA;--ink:#151A21;--muted:#65707D;--line:#D7DDE4;--soft:#FFFFFF;}
body{background:var(--page);color:var(--ink);font-family:'Segoe UI Variable','Segoe UI',system-ui,sans-serif;padding:32px 16px;min-height:100dvh;}
button{font:inherit;}
.pw{max-width:760px;margin:0 auto;}
.pi{background:var(--panel);border:1px solid rgba(21,26,33,.08);border-radius:14px;padding:28px 24px;position:relative;box-shadow:0 18px 48px -32px rgba(35,48,62,.28);}
.pvol{font-size:10px;letter-spacing:.18em;color:rgba(21,26,33,.42);text-transform:uppercase;text-align:center;margin-bottom:18px;}
.ptabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:26px;}
.ptab{padding:7px 14px;border-radius:999px;border:1px solid rgba(21,26,33,.12);background:rgba(255,255,255,.58);color:rgba(21,26,33,.62);cursor:pointer;font-size:12px;font-weight:600;letter-spacing:.02em;transition:transform .18s ease,background .18s ease,color .18s ease,border-color .18s ease;}
.ptab:hover{background:#fff;color:var(--ink);}
.ptab:active{transform:translateY(1px) scale(.99);}
.ptab:focus-visible{outline:2px solid currentColor;outline-offset:3px;}
.ptab.on{border-color:transparent;}
.pcard{display:none;}
.pcard.on{display:block;}
.phead{text-align:left;margin-bottom:24px;}
.pname{font-size:22px;font-weight:650;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;}
.psub{font-size:12px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
.psec{margin-bottom:24px;}
.pslabel{font-size:10px;font-weight:650;letter-spacing:.18em;color:rgba(21,26,33,.38);text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(21,26,33,.08);}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;}
.sw,.acc,.st,.typo{border-radius:10px;cursor:pointer;border:1px solid rgba(21,26,33,.08);box-shadow:inset 0 1px 0 rgba(255,255,255,.38);transition:transform .16s ease,filter .16s ease;}
.sw:hover,.acc:hover,.st:hover,.typo:hover{filter:saturate(1.04) contrast(1.02);}
.sw:active,.acc:active,.st:active,.typo:active{transform:translateY(1px) scale(.99);}
.sw{padding:14px 12px;min-height:88px;display:flex;flex-direction:column;justify-content:flex-end;}
.swn{font-size:11px;font-weight:650;line-height:1.35;}
.swns{font-size:10px;font-weight:450;opacity:.62;display:block;margin-top:1px;}
.swh{font-family:'Cascadia Mono','Courier New',monospace;font-size:10px;margin-top:5px;opacity:.62;}
.typo{display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:650;min-height:88px;}
.acc{padding:14px;min-height:98px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.acch{font-family:'Cascadia Mono','Courier New',monospace;font-size:16px;font-weight:650;}
.accn{font-size:10px;margin-top:6px;opacity:.82;line-height:1.4;}
.st{padding:10px;min-height:74px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.sth{font-family:'Cascadia Mono','Courier New',monospace;font-size:13px;font-weight:650;}
.stn{font-size:10px;margin-top:4px;opacity:.82;}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(17,24,31,.92);color:rgba(255,255,255,.92);font-family:'Cascadia Mono','Courier New',monospace;font-size:11px;padding:7px 14px;border-radius:999px;pointer-events:none;opacity:0;transition:opacity .18s ease;white-space:nowrap;z-index:3;border:1px solid rgba(255,255,255,.12);}
.toast.on{opacity:1;}
@media(max-width:640px){body{padding:18px 12px;}.pi{padding:22px 16px;}.g3,.g4{grid-template-columns:1fr 1fr;}.phead{text-align:left;}.pname{font-size:18px;}}
</style>
</head>
<body>
<div class="pw"><div class="pi">
  <div class="pvol">Vol.1 / Updated Light Mode</div>
  <div class="ptabs" id="T"></div>
  <div id="C"></div>
  <div class="toast" id="K"></div>
</div></div>
<script>
const STATUS=[
  {n:'Success',h:'#2F7D52'},
  {n:'Warning',h:'#A87524'},
  {n:'Error',h:'#B84A4A'},
  {n:'Info',h:'#3E75A8'}
];
const PL=[
{id:'deep-ocean',name:'Deep Ocean',tag:'Fluent coastal neutral with composed teal control states',ac:'#247C8A',
base:[
  {n:'Background',s:'Sea Glass White',h:'#F4F8FA'},
  {n:'Surface',s:'Mist Layer',h:'#EAF1F4'},
  {n:'Elevated',s:'Clean Panel',h:'#FFFFFF'},
  {t:'aa',h:'#102027',bg:'#EAF1F4'},
  {n:'Text secondary',s:'Tide Grey',h:'#526C75'},
  {n:'Border / Divider',s:'Soft Current',h:'#C9D9DE'},
],
acc:[
  {n:'System Teal',s:'Primary accent',h:'#247C8A'},
  {n:'Quiet Cyan',s:'Secondary accent',h:'#4DA2AA'},
  {n:'Mica Tint',s:'Highlight',h:'#D7EEF2'},
],
sta:STATUS},
{id:'slate-steel',name:'Slate / Steel',tag:'Neutral Fluent shell with blue-grey emphasis',ac:'#3E6FA8',
base:[
  {n:'Background',s:'Cloud Slate',h:'#F5F6F8'},
  {n:'Surface',s:'Cool Sheet',h:'#ECEFF3'},
  {n:'Elevated',s:'White Plate',h:'#FFFFFF'},
  {t:'aa',h:'#151A21',bg:'#ECEFF3'},
  {n:'Text secondary',s:'Steel Grey',h:'#606B79'},
  {n:'Border / Divider',s:'Tempered Line',h:'#D3D9E1'},
],
acc:[
  {n:'Steel Blue',s:'Primary accent',h:'#3E6FA8'},
  {n:'Washed Cobalt',s:'Secondary accent',h:'#668DBE'},
  {n:'Frosted Blue',s:'Highlight',h:'#DCE8F5'},
],
sta:STATUS},
{id:'ember-forge',name:'Ember Forge',tag:'Warm utility palette with muted copper actions',ac:'#A65F3D',
base:[
  {n:'Background',s:'Warm Canvas',h:'#FAF5EF'},
  {n:'Surface',s:'Linen Panel',h:'#F1E7DB'},
  {n:'Elevated',s:'Porcelain',h:'#FFFFFF'},
  {t:'aa',h:'#241912',bg:'#F1E7DB'},
  {n:'Text secondary',s:'Smoked Clay',h:'#746154'},
  {n:'Border / Divider',s:'Dry Edge',h:'#DED0C2'},
],
acc:[
  {n:'Muted Copper',s:'Primary accent',h:'#A65F3D'},
  {n:'Soft Terracotta',s:'Secondary accent',h:'#C07855'},
  {n:'Amber Wash',s:'Highlight',h:'#EEDAC9'},
],
sta:STATUS},
{id:'midnight-orchid',name:'Dusk Berry',tag:'Muted berry system color without purple glare',ac:'#8B5570',
base:[
  {n:'Background',s:'Powder Veil',h:'#F8F5F7'},
  {n:'Surface',s:'Soft Mauve',h:'#EFE8ED'},
  {n:'Elevated',s:'White Panel',h:'#FFFFFF'},
  {t:'aa',h:'#211A20',bg:'#EFE8ED'},
  {n:'Text secondary',s:'Dusty Fig',h:'#766773'},
  {n:'Border / Divider',s:'Pressed Petal',h:'#DDD2DA'},
],
acc:[
  {n:'Dusk Berry',s:'Primary accent',h:'#8B5570'},
  {n:'Tea Rose',s:'Secondary accent',h:'#AA738B'},
  {n:'Petal Wash',s:'Highlight',h:'#EADBE4'},
],
sta:STATUS},
{id:'arctic-moss',name:'Arctic Moss',tag:'Calm sage Fluent palette for readable workflow UIs',ac:'#3F7D5A',
base:[
  {n:'Background',s:'Frosted Sage',h:'#F4F8F5'},
  {n:'Surface',s:'Pale Lichen',h:'#E8F0EA'},
  {n:'Elevated',s:'Clean Panel',h:'#FFFFFF'},
  {t:'aa',h:'#132019',bg:'#E8F0EA'},
  {n:'Text secondary',s:'Grey Fern',h:'#5C7064'},
  {n:'Border / Divider',s:'Moss Line',h:'#CFDDD3'},
],
acc:[
  {n:'Sage Action',s:'Primary accent',h:'#3F7D5A'},
  {n:'Fresh Fern',s:'Secondary accent',h:'#609A76'},
  {n:'Mint Mica',s:'Highlight',h:'#DCECE1'},
],
sta:STATUS},
];
const T=document.getElementById('T'),C=document.getElementById('C'),K=document.getElementById('K');
let kTimer;
function lum(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return r*.299+g*.587+b*.114;}
function tfg(h){return lum(h)>150?'#111820':'rgba(255,255,255,.94)';}
function copy(h){
  navigator.clipboard.writeText(h).catch(()=>{});
  clearTimeout(kTimer);
  K.textContent=h+' copied';
  K.classList.add('on');
  kTimer=setTimeout(()=>K.classList.remove('on'),1600);
}
function mkCard(p){
  const base=p.base.map(s=>s.t==='aa'
    ?`<div class="typo" style="background:${s.bg};color:${s.h}" onclick="copy('${s.h}')">Aa</div>`
    :`<div class="sw" style="background:${s.h}" onclick="copy('${s.h}')">
        <div class="swn" style="color:${tfg(s.h)}">${s.n}<span class="swns">${s.s}</span></div>
        <div class="swh" style="color:${tfg(s.h)}">${s.h}</div>
      </div>`
  ).join('');
  const acc=p.acc.map(a=>`
    <div class="acc" style="background:${a.h}" onclick="copy('${a.h}')">
      <div class="acch" style="color:${tfg(a.h)}">${a.h}</div>
      <div class="accn" style="color:${tfg(a.h)}">${a.n}<br>${a.s}</div>
    </div>`).join('');
  const sta=p.sta.map(s=>`
    <div class="st" style="background:${s.h}" onclick="copy('${s.h}')">
      <div class="sth" style="color:${tfg(s.h)}">${s.h}</div>
      <div class="stn" style="color:${tfg(s.h)}">${s.n}</div>
    </div>`).join('');
  return `
    <div class="phead">
      <div class="pname" style="color:${p.ac}">${p.name} Palette</div>
      <div class="psub">${p.tag}</div>
    </div>
    <div class="psec"><div class="pslabel">Base Colors</div><div class="g3">${base}</div></div>
    <div class="psec"><div class="pslabel">Accent Colors</div><div class="g3">${acc}</div></div>
    <div class="psec"><div class="pslabel">Status Colors</div><div class="g4">${sta}</div></div>`;
}
PL.forEach((p,i)=>{
  const btn=document.createElement('button');
  btn.className='ptab'+(i===0?' on':'');
  btn.textContent=p.name;
  if(i===0){btn.style.background=p.ac;btn.style.color=tfg(p.ac);}
  btn.onclick=()=>{
    document.querySelectorAll('.ptab').forEach((b,j)=>{
      b.classList.toggle('on',j===i);
      b.style.background=j===i?PL[j].ac:'';
      b.style.color=j===i?tfg(PL[j].ac):'';
      b.style.borderColor=j===i?'transparent':'';
    });
    document.querySelectorAll('.pcard').forEach((c,j)=>c.classList.toggle('on',j===i));
  };
  T.appendChild(btn);
  const card=document.createElement('div');
  card.className='pcard'+(i===0?' on':'');
  card.innerHTML=mkCard(p);
  C.appendChild(card);
});
</script>
</body>
</html>
