<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Updated Dark Mode Palette Collection</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{color-scheme:dark;--page:#0E1116;--panel:#12161D;--ink:#E7EBF0;--muted:#9BA5B2;--line:#2A323D;}
body{background:var(--page);color:var(--ink);font-family:'Segoe UI Variable','Segoe UI',system-ui,sans-serif;padding:32px 16px;min-height:100dvh;}
button{font:inherit;}
.pw{max-width:760px;margin:0 auto;}
.pi{background:var(--panel);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:28px 24px;position:relative;box-shadow:0 18px 54px -34px rgba(0,0,0,.72);}
.pvol{font-size:10px;letter-spacing:.18em;color:rgba(231,235,240,.42);text-transform:uppercase;text-align:center;margin-bottom:18px;}
.ptabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:26px;}
.ptab{padding:7px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);color:rgba(231,235,240,.62);cursor:pointer;font-size:12px;font-weight:600;letter-spacing:.02em;transition:transform .18s ease,background .18s ease,color .18s ease,border-color .18s ease;}
.ptab:hover{background:rgba(255,255,255,.08);color:var(--ink);}
.ptab:active{transform:translateY(1px) scale(.99);}
.ptab:focus-visible{outline:2px solid currentColor;outline-offset:3px;}
.ptab.on{border-color:transparent;}
.pcard{display:none;}
.pcard.on{display:block;}
.phead{text-align:left;margin-bottom:24px;}
.pname{font-size:22px;font-weight:650;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;}
.psub{font-size:12px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
.psec{margin-bottom:24px;}
.pslabel{font-size:10px;font-weight:650;letter-spacing:.18em;color:rgba(231,235,240,.38);text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.08);}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;}
.sw,.acc,.st,.typo{border-radius:10px;cursor:pointer;border:1px solid rgba(255,255,255,.08);box-shadow:inset 0 1px 0 rgba(255,255,255,.08);transition:transform .16s ease,filter .16s ease;}
.sw:hover,.acc:hover,.st:hover,.typo:hover{filter:saturate(1.04) contrast(1.03);}
.sw:active,.acc:active,.st:active,.typo:active{transform:translateY(1px) scale(.99);}
.sw{padding:14px 12px;min-height:88px;display:flex;flex-direction:column;justify-content:flex-end;}
.swn{font-size:11px;font-weight:650;line-height:1.35;}
.swns{font-size:10px;font-weight:450;opacity:.66;display:block;margin-top:1px;}
.swh{font-family:'Cascadia Mono','Courier New',monospace;font-size:10px;margin-top:5px;opacity:.66;}
.typo{display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:650;min-height:88px;}
.acc{padding:14px;min-height:98px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.acch{font-family:'Cascadia Mono','Courier New',monospace;font-size:16px;font-weight:650;}
.accn{font-size:10px;margin-top:6px;opacity:.84;line-height:1.4;}
.st{padding:10px;min-height:74px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.sth{font-family:'Cascadia Mono','Courier New',monospace;font-size:13px;font-weight:650;}
.stn{font-size:10px;margin-top:4px;opacity:.84;}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(246,248,250,.1);color:rgba(246,248,250,.92);font-family:'Cascadia Mono','Courier New',monospace;font-size:11px;padding:7px 14px;border-radius:999px;pointer-events:none;opacity:0;transition:opacity .18s ease;white-space:nowrap;z-index:3;border:1px solid rgba(255,255,255,.14);}
.toast.on{opacity:1;}
@media(max-width:640px){body{padding:18px 12px;}.pi{padding:22px 16px;}.g3,.g4{grid-template-columns:1fr 1fr;}.phead{text-align:left;}.pname{font-size:18px;}}
</style>
</head>
<body>
<div class="pw"><div class="pi">
  <div class="pvol">Updated Dark Mode</div>
  <div class="ptabs" id="T"></div>
  <div id="C"></div>
  <div class="toast" id="K"></div>
</div></div>
<script>
const STATUS=[
  {n:'Success',h:'#68B487'},
  {n:'Warning',h:'#D3A451'},
  {n:'Error',h:'#DF7772'},
  {n:'Info',h:'#78A6D8'}
];
const PL=[
{id:'deep-ocean',name:'Deep Ocean',tag:'Dark Fluent shell with legible teal control states',ac:'#5BB7C4',
base:[
  {n:'Background',s:'Abyss Slate',h:'#0B1418'},
  {n:'Surface',s:'Deep Mica',h:'#111E24'},
  {n:'Elevated',s:'Raised Panel',h:'#182A31'},
  {t:'aa',h:'#DCEAEC',bg:'#111E24'},
  {n:'Text secondary',s:'Fog Tide',h:'#89A9B1'},
  {n:'Border / Divider',s:'Current Line',h:'#25404A'},
],
acc:[
  {n:'System Teal',s:'Primary accent',h:'#5BB7C4'},
  {n:'Quiet Cyan',s:'Secondary accent',h:'#7BCAD3'},
  {n:'Mica Tint',s:'Highlight',h:'#193B43'},
],
sta:STATUS},
{id:'slate-steel',name:'Slate / Steel',tag:'Graphite utility mode with quiet steel-blue emphasis',ac:'#78A6D8',
base:[
  {n:'Background',s:'Graphite Base',h:'#101318'},
  {n:'Surface',s:'Iron Sheet',h:'#171C23'},
  {n:'Elevated',s:'Raised Steel',h:'#202733'},
  {t:'aa',h:'#E2E7EE',bg:'#171C23'},
  {n:'Text secondary',s:'Blue Grey',h:'#9AA6B5'},
  {n:'Border / Divider',s:'Tempered Edge',h:'#303A49'},
],
acc:[
  {n:'Steel Blue',s:'Primary accent',h:'#78A6D8'},
  {n:'Washed Cobalt',s:'Secondary accent',h:'#96B9E0'},
  {n:'Frosted Blue',s:'Highlight',h:'#21354B'},
],
sta:STATUS},
{id:'ember-forge',name:'Ember Forge',tag:'Dark warm utility palette with restrained copper actions',ac:'#D18A63',
base:[
  {n:'Background',s:'Smoked Umber',h:'#18110D'},
  {n:'Surface',s:'Char Linen',h:'#231812'},
  {n:'Elevated',s:'Raised Clay',h:'#302219'},
  {t:'aa',h:'#EFE2D7',bg:'#231812'},
  {n:'Text secondary',s:'Ash Copper',h:'#B49B8A'},
  {n:'Border / Divider',s:'Dry Ember',h:'#473229'},
],
acc:[
  {n:'Muted Copper',s:'Primary accent',h:'#D18A63'},
  {n:'Soft Terracotta',s:'Secondary accent',h:'#E0A07B'},
  {n:'Amber Wash',s:'Highlight',h:'#4C2F21'},
],
sta:STATUS},
{id:'midnight-orchid',name:'Dusk Berry',tag:'Muted berry dark mode without purple glare',ac:'#C489A4',
base:[
  {n:'Background',s:'Blackberry Ink',h:'#151015'},
  {n:'Surface',s:'Dusk Panel',h:'#201820'},
  {n:'Elevated',s:'Raised Fig',h:'#2B202B'},
  {t:'aa',h:'#EDE3EA',bg:'#201820'},
  {n:'Text secondary',s:'Soft Mauve',h:'#AE9BA9'},
  {n:'Border / Divider',s:'Petal Edge',h:'#403241'},
],
acc:[
  {n:'Dusk Berry',s:'Primary accent',h:'#C489A4'},
  {n:'Tea Rose',s:'Secondary accent',h:'#D6A0B8'},
  {n:'Petal Wash',s:'Highlight',h:'#44283A'},
],
sta:STATUS},
{id:'arctic-moss',name:'Arctic Moss',tag:'Dark sage Fluent palette for calm operational screens',ac:'#6FB486',
base:[
  {n:'Background',s:'Forest Graphite',h:'#0E1511'},
  {n:'Surface',s:'Deep Lichen',h:'#152019'},
  {n:'Elevated',s:'Raised Moss',h:'#1D2B22'},
  {t:'aa',h:'#DDE9E1',bg:'#152019'},
  {n:'Text secondary',s:'Grey Sage',h:'#95AD9D'},
  {n:'Border / Divider',s:'Moss Line',h:'#2E4436'},
],
acc:[
  {n:'Sage Action',s:'Primary accent',h:'#6FB486'},
  {n:'Fresh Fern',s:'Secondary accent',h:'#8BC99D'},
  {n:'Mint Mica',s:'Highlight',h:'#214431'},
],
sta:STATUS},
];
const T=document.getElementById('T'),C=document.getElementById('C'),K=document.getElementById('K');
let kTimer;
function lum(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return r*.299+g*.587+b*.114;}
function tfg(h){return lum(h)>150?'#111820':'rgba(255,255,255,.94)';}
function copy(h){
  navigator.clipboard.writeText(h).catch(()=>{});
  clearTimeout(kTimer);
  K.textContent=h+' copied';
  K.classList.add('on');
  kTimer=setTimeout(()=>K.classList.remove('on'),1600);
}
function mkCard(p){
  const base=p.base.map(s=>s.t==='aa'
    ?`<div class="typo" style="background:${s.bg};color:${s.h}" onclick="copy('${s.h}')">Aa</div>`
    :`<div class="sw" style="background:${s.h}" onclick="copy('${s.h}')">
        <div class="swn" style="color:${tfg(s.h)}">${s.n}<span class="swns">${s.s}</span></div>
        <div class="swh" style="color:${tfg(s.h)}">${s.h}</div>
      </div>`
  ).join('');
  const acc=p.acc.map(a=>`
    <div class="acc" style="background:${a.h}" onclick="copy('${a.h}')">
      <div class="acch" style="color:${tfg(a.h)}">${a.h}</div>
      <div class="accn" style="color:${tfg(a.h)}">${a.n}<br>${a.s}</div>
    </div>`).join('');
  const sta=p.sta.map(s=>`
    <div class="st" style="background:${s.h}" onclick="copy('${s.h}')">
      <div class="sth" style="color:${tfg(s.h)}">${s.h}</div>
      <div class="stn" style="color:${tfg(s.h)}">${s.n}</div>
    </div>`).join('');
  return `
    <div class="phead">
      <div class="pname" style="color:${p.ac}">${p.name} Palette</div>
      <div class="psub">${p.tag}</div>
    </div>
    <div class="psec"><div class="pslabel">Base Colors</div><div class="g3">${base}</div></div>
    <div class="psec"><div class="pslabel">Accent Colors</div><div class="g3">${acc}</div></div>
    <div class="psec"><div class="pslabel">Status Colors</div><div class="g4">${sta}</div></div>`;
}
PL.forEach((p,i)=>{
  const btn=document.createElement('button');
  btn.className='ptab'+(i===0?' on':'');
  btn.textContent=p.name;
  if(i===0){btn.style.background=p.ac;btn.style.color=tfg(p.ac);}
  btn.onclick=()=>{
    document.querySelectorAll('.ptab').forEach((b,j)=>{
      b.classList.toggle('on',j===i);
      b.style.background=j===i?PL[j].ac:'';
      b.style.color=j===i?tfg(PL[j].ac):'';
      b.style.borderColor=j===i?'transparent':'';
    });
    document.querySelectorAll('.pcard').forEach((c,j)=>c.classList.toggle('on',j===i));
  };
  T.appendChild(btn);
  const card=document.createElement('div');
  card.className='pcard'+(i===0?' on':'');
  card.innerHTML=mkCard(p);
  C.appendChild(card);
});
</script>
</body>
</html>
